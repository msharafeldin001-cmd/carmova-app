<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rydio Admin</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f7f9fc; color:#12203a; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .grid { display:grid; grid-template-columns: repeat(3,1fr); gap:16px; }
    .card { background:white; border-radius:16px; padding:18px; box-shadow: 0 10px 30px rgba(0,0,0,.08); margin-bottom:16px; }
    button { padding: 12px 16px; border-radius: 10px; border:0; background:#2d7ff9; color:#fff; font-weight:700; cursor:pointer; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Rydio Admin</h1>
    <div class="grid">
      <div class="card"><h3>Commission</h3><p id="commission">10%</p></div>
      <div class="card"><h3>Total trips</h3><p id="tripCount">0</p></div>
      <div class="card"><h3>Online drivers</h3><p id="onlineDrivers">0</p></div>
    </div>
    <div class="card">
      <button id="refreshBtn">Refresh Dashboard</button>
      <h3>Trips</h3>
      <pre id="tripsBox"></pre>
      <h3>Drivers</h3>
      <pre id="driversBox"></pre>
    </div>
  </div>
<script>
const API = 'http://localhost:4000';

async function refresh() {
  const [tripsRes, driversRes, pricingRes] = await Promise.all([
    fetch(`${API}/trips`),
    fetch(`${API}/drivers`),
    fetch(`${API}/pricing/quote?distance=5&duration=15`)
  ]);
  const trips = await tripsRes.json();
  const drivers = await driversRes.json();
  const pricing = await pricingRes.json();
  document.getElementById('commission').textContent = `${pricing.commissionRate * 100}%`;
  document.getElementById('tripCount').textContent = trips.length;
  document.getElementById('onlineDrivers').textContent = drivers.filter(d => d.online).length;
  document.getElementById('tripsBox').textContent = JSON.stringify(trips, null, 2);
  document.getElementById('driversBox').textContent = JSON.stringify(drivers, null, 2);
}

document.getElementById('refreshBtn').onclick = refresh;
refresh();
</script>
</body>
</html>
