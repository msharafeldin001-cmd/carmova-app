<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carmova Rider</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0b1020; color: #fff; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px; }
    .card { background: #151d35; border-radius: 16px; padding: 18px; margin-bottom: 16px; }
    input, button { width: 100%; padding: 12px; border-radius: 10px; border: 0; margin-top: 8px; }
    button { background: #2d7ff9; color: #fff; font-weight: 700; cursor: pointer; }
    .muted { color: #aeb6cc; font-size: 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pill { display: inline-block; padding: 6px 10px; background:#223056; border-radius:999px; font-size: 12px; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Carmova</h1>
    <p class="muted">Tap. Ride. Go. Rider app for carmova.uk</p>

    <div class="card">
      <div class="pill">Platform commission: 10%</div>
      <h3>Book a ride</h3>
      <label>Pickup</label>
      <input id="pickup" value="Liverpool ONE" />
      <label>Destination</label>
      <input id="destination" value="John Lennon Airport" />
      <div class="row">
        <div>
          <label>Distance (miles)</label>
          <input id="distance" type="number" step="0.1" value="7.5" />
        </div>
        <div>
          <label>Duration (minutes)</label>
          <input id="duration" type="number" step="1" value="20" />
        </div>
      </div>
      <button id="quoteBtn">Get Fare Estimate</button>
      <pre id="quoteBox">No fare calculated yet.</pre>
      <button id="bookBtn">Request Ride</button>
    </div>

    <div class="card">
      <h3>Latest trip</h3>
      <pre id="tripBox">No trip requested yet.</pre>
    </div>
  </div>

<script>
const API = 'https://api.carmova.uk';
let latestTrip = null;

async function getQuote() {
  const distance = document.getElementById('distance').value;
  const duration = document.getElementById('duration').value;
  const res = await fetch(`${API}/pricing/quote?distance=${distance}&duration=${duration}`);
  const data = await res.json();
  document.getElementById('quoteBox').innerHTML =
  `<div style="line-height:1.6;">
    <strong style="font-size:18px;">£${data.subtotal}</strong><br/>
    <small>Driver earns: £${data.driverNet}</small><br/>
    <small>Platform fee: £${data.platformFee}</small><br/>
    <small>Commission: ${data.commissionRate * 100}%</small>
  </div>`; 
}

async function requestRide() {
  const payload = {
    pickup: document.getElementById('pickup').value,
    destination: document.getElementById('destination').value,
    distanceMiles: Number(document.getElementById('distance').value),
    durationMinutes: Number(document.getElementById('duration').value)
  };
  const res = await fetch(`${API}/trips/request`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
  });
  latestTrip = await res.json();
  document.getElementById('tripBox').innerHTML =
  `<div style="line-height:1.7;">
    <div style="font-size:18px;font-weight:700;">Ride requested</div>
    <div>From: ${latestTrip.pickup}</div>
    <div>To: ${latestTrip.destination}</div>
    <div>Status: ${latestTrip.status}</div>
    <div>Driver: ${latestTrip.driverId || 'Searching...'}</div>
    <div>Fare: £${latestTrip.quote.subtotal}</div>
  </div>`;
}

document.getElementById('quoteBtn').onclick = getQuote;
document.getElementById('bookBtn').onclick = requestRide;
</script>
</body>
</html>
